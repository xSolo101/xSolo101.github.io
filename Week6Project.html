<!DOCTYPE html>
<html lang="en">

<head>	
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">
    <title>Pokemon Team Builder</title>

    <style>
        body {
            background: lightblue;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .mainContainer {
            background: white;
            width: 420px;
            padding: 20px;
            border: 4px solid orange;
            border-radius: 25px;
            text-align: center;
        }

        img {
            width: 320px;
            margin: 15px 0;
        }

        audio {
            width: 100%;
            margin: 15px 0;
        }

        select {
            width: 45%;
            margin: 5px;
        }

        button {
            margin-top: 10px;
            padding: 5px 10px;
        }
    </style>
</head>

<body>

    <div class="mainContainer">

    <h3 id="titleLabel">Name or ID</h3>

    <input type="text" id="pokemonInput">
    <button onclick="findPokemon()" id="findButton">Find</button>

    <br><br>

    <img src="sprite.png" alt="Pokemon Sprite" id="pokemonSprite">

    <audio controls id="pokemonAudio"></audio>

    <br>

    <select id="moveSelect1"></select>
    <select id="moveSelect2"></select>
    <br>
    <select id="moveSelect3"></select>
    <select id="moveSelect4"></select>

    <br><br>

    <button type="button" id="addToTeamButton">Add to Team</button>

</div>
<div id="teamContainer"></div>

<script src="pokeJS.js"></script>
</body>
</html>
